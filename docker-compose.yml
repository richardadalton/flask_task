# docker-compose.yml
services:
  mongo-container:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "-u", "root", "-p", "password", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    profiles: [full]
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://root:password@mongo-container:27017/?authSource=admin
    depends_on:
      mongo-container:
        condition: service_healthy
